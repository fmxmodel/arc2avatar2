# Arc2Avatar — Full calibration run
# Approaching paper defaults for meaningful convergence

stage1:
  iterations: 500

stage2:
  iterations: 1000

animation:
  expressions: ["neutral", "smile", "open_mouth", "raised_brow"]
  refinement_iterations: 200

manual_approval:
