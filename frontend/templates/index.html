<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc2Avatar — 3D Avatar from Photo</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: #0f0f13; color: #e0e0e0; overflow: hidden; height: 100vh; }
  #app { display: flex; height: 100vh; }
  #sidebar { width: 380px; background: #1a1a24; padding: 24px; display: flex;
             flex-direction: column; border-right: 1px solid #2a2a3a; overflow-y: auto; }
  #sidebar h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; 
                background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text;
                -webkit-text-fill-color: transparent; }
  #sidebar .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
  #upload-zone { border: 2px dashed #3a3a4a; border-radius: 12px; padding: 32px 20px;
                 text-align: center; cursor: pointer; transition: all 0.3s;
                 background: #12121c; margin-bottom: 16px; }
  #upload-zone:hover { border-color: #667eea; background: #1a1a2e; }
  #upload-zone.dragover { border-color: #764ba2; background: #1f1f35; }
  #upload-zone.has-image { border-style: solid; border-color: #4a4a5a; }
  #upload-zone img { max-width: 100%; max-height: 160px; border-radius: 8px; }
  #upload-zone .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  #upload-zone .text { color: #888; font-size: 14px; }
  #upload-zone .text strong { color: #ccc; }
  #file-input { display: none; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px;
         font-weight: 600; cursor: pointer; transition: all 0.3s; margin-bottom: 8px; }
  .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(102,126,234,0.4); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: #2a2a3a; color: #ccc; }
  .btn-secondary:hover { background: #3a3a4a; }
  #status { padding: 12px; border-radius: 8px; margin-top: 8px; font-size: 13px;
            background: #12121c; border: 1px solid #2a2a3a; min-height: 40px; }
  #status .label { color: #888; margin-bottom: 4px; }
  #status .value { color: #e0e0e0; font-family: monospace; }
  #status .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #3a3a4a;
                      border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite;
                      margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #viewport { flex: 1; position: relative; background: #0a0a0f; }
  #viewport canvas { display: block; }
  #viewport .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
                      text-align: center; color: #555; }
  #viewport .loader .sp { display: inline-block; width: 40px; height: 40px; border: 3px solid #2a2a3a;
                          border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; }
  #face-info { margin-top: 8px; padding: 12px; border-radius: 8px; font-size: 12px;
               background: #12121c; border: 1px solid #2a2a3a; display: none; }
  #face-info .row { display: flex; justify-content: space-between; padding: 2px 0; }
  #face-info .row .key { color: #888; }
  #face-info .row .val { color: #4ade80; font-family: monospace; }
  @media (max-width: 768px) { #app { flex-direction: column; } #sidebar { width: 100%; max-height: 50vh; } }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>✦ Arc2Avatar</h1>
    <div class="subtitle">Single photo → animatable 3D head avatar</div>
    <div id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📸</div>
      <div class="text"><strong>Click to upload</strong> or drag a photo here</div>
      <div class="text" style="font-size:12px;margin-top:4px">Frontal face photo, JPG or PNG</div>
      <img id="preview" style="display:none;margin-top:12px">
    </div>
    <input type="file" id="file-input" accept="image/*">
    <button class="btn btn-primary" id="btn-generate" disabled>✦ Generate 3D Avatar</button>
    <button class="btn btn-secondary" id="btn-download" style="display:none">⬇ Download PLY</button>
    <div id="face-info"></div>
    <div id="status"><div class="label">Status</div><div class="value" id="status-text">Ready</div></div>
  </div>
  <div id="viewport">
    <div class="loader" id="viewer-loader"><div class="sp"></div><div style="margin-top:12px">Loading 3D viewer...</div></div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

const container = document.getElementById('viewport');
const loaderEl = document.getElementById('viewer-loader');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 100);
camera.position.set(2, 1, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.update();

const ambient = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambient);
const d1 = new THREE.DirectionalLight(0xffffff, 0.8);
d1.position.set(1, 2, 1); scene.add(d1);
const d2 = new THREE.DirectionalLight(0x8888ff, 0.3);
d2.position.set(-1, -1, -1); scene.add(d2);

const grid = new THREE.GridHelper(3, 20, 0x333355, 0x222244);
grid.position.y = -0.5;
scene.add(grid);

loaderEl.style.display = 'none';

let pointCloud = null;

function loadPLY(url) {
  if (pointCloud) { scene.remove(pointCloud); pointCloud.geometry.dispose(); pointCloud.material.dispose(); }
  loaderEl.textContent = 'Loading 3D model...';
  loaderEl.style.display = 'block';

  const l = new PLYLoader();
  l.load(url, (geo) => {
    geo.computeVertexNormals();
    const mat = new THREE.PointsMaterial({
      size: 0.008, vertexColors: true, sizeAttenuation: true,
      transparent: true, opacity: 0.9,
    });
    pointCloud = new THREE.Points(geo, mat);
    scene.add(pointCloud);

    geo.computeBoundingSphere();
    const r = geo.boundingSphere.radius;
    const d = r * 2.5;
    camera.position.set(d*0.7, d*0.3, d*0.7);
    controls.target.set(0, 0, 0);
    controls.update();

    loaderEl.style.display = 'none';
  }, undefined, (err) => {
    loaderEl.textContent = '❌ Failed to load: ' + err.message;
  });
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// Drag & drop
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) { document.getElementById('file-input').files = e.dataTransfer.files; handleFile(file); }
});

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const p = document.getElementById('preview');
    p.src = ev.target.result;
    p.style.display = 'block';
    document.querySelector('#upload-zone .icon').style.display = 'none';
    document.querySelector('#upload-zone .text').style.display = 'none';
    document.getElementById('upload-zone').classList.add('has-image');
    document.getElementById('btn-generate').disabled = false;
  };
  reader.readAsDataURL(file);
}

function setStatus(text) {
  document.getElementById('status-text').innerHTML = text;
}

document.getElementById('btn-generate').addEventListener('click', startGen);
document.getElementById('btn-download').addEventListener('click', () => {
  if (window.currentPlyUrl) window.open(window.currentPlyUrl, '_blank');
});

async function startGen() {
  const file = document.getElementById('file-input').files[0];
  if (!file) return;
  const btn = document.getElementById('btn-generate');
  btn.disabled = true; btn.textContent = '✦ Generating...';
  document.getElementById('btn-download').style.display = 'none';
  document.getElementById('face-info').style.display = 'none';
  setStatus('<span class="spinner"></span> Uploading...');

  const fd = new FormData();
  fd.append('photo', file);
  try {
    const r = await fetch('/api/upload', { method: 'POST', body: fd });
    const d = await r.json();
    window.currentJobId = d.job_id;
    pollStatus();
  } catch(e) { setStatus('❌ Upload failed'); btn.disabled = false; btn.textContent = '✦ Retry'; }
}

async function pollStatus() {
  if (!window.currentJobId) return;
  try {
    const r = await fetch('/api/status/' + window.currentJobId);
    const j = await r.json();
    if (j.status === 'failed') { setStatus('❌ ' + (j.progress || 'Failed')); resetBtn(); return; }
    setStatus(j.progress || 'Processing...');

    if (j.face_info) {
      const fi = document.getElementById('face-info');
      fi.style.display = 'block';
      fi.innerHTML = '<div class="row"><span class="key">Face detected</span><span class="val">✅</span></div>' +
        '<div class="row"><span class="key">Bounding box</span><span class="val">' + j.face_info.bbox_size + 'px</span></div>';
    }

    if (j.status === 'completed' && j.ply_url) {
      setStatus('✅ 3D avatar ready!');
      resetBtn();
      document.getElementById('btn-download').style.display = 'block';
      window.currentPlyUrl = j.ply_url;
      loadPLY(j.ply_url);
      return;
    }
    setTimeout(pollStatus, 1000);
  } catch(e) { setTimeout(pollStatus, 2000); }
}

function resetBtn() {
  const btn = document.getElementById('btn-generate');
  btn.disabled = false; btn.textContent = '✦ Generate Again';
}
</script>
</body>
</html>
